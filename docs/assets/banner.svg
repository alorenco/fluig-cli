<svg width="560" height="120" viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="fluigcli — CLI não oficial para desenvolvimento TOTVS Fluig">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- janela do terminal -->
  <rect x="1" y="1" width="558" height="118" rx="14" fill="#0d1420" stroke="#2c3a52" stroke-width="2"/>
  <!-- prompt -->
  <text x="32" y="55" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,Consolas,monospace" font-size="36" font-weight="600" fill="#e6edf3" letter-spacing="0.5">
    <tspan fill="url(#accent)">❯</tspan><tspan dx="14">fluigcli</tspan><tspan dx="10" fill="#22d3ee">▌<animate attributeName="fill-opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite"/></tspan>
  </text>
  <!-- tagline -->
  <text x="32" y="87" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,Consolas,monospace" font-size="15" fill="#8b98ab"><tspan fill="#3fb950">#</tspan> CLI não oficial para desenvolvimento TOTVS Fluig</text>
</svg>
