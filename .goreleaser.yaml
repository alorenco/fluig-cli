version: 2

project_name: fluigcli

builds:
  - main: ./cmd/fluigcli
    binary: fluigcli
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Release notes: o padrão do projeto é só a lista de títulos das melhorias
# (ver CLAUDE.md "Processo de release") — sem footer de autoria/atualização;
# o crédito e as instruções de instalação ficam no README.
release:
  draft: false
  prerelease: auto
