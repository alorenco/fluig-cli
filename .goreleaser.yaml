version: 2

project_name: fluigcli

builds:
  - main: ./cmd/fluigcli
    binary: fluigcli
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  footer: |
    ---
    Projeto **não oficial** e de código aberto, sem vínculo com a TOTVS.
    Criado e mantido por [Alessandro Lorençone](https://github.com/alorenco).
